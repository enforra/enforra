version: 1
mode: observe
defaults:
  decision: block
policies:
  - id: allow-small-refunds
    description: Allow small refunds automatically
    match:
      agent: support-agent
      tool: stripe.refund
    conditions:
      - field: args.amount
        operator: lte
        value: 50
    decision: allow

  - id: approve-medium-refunds
    description: Require approval for medium refunds
    priority: 20
    match:
      agent: support-agent
      tool: stripe.refund
    conditions:
      all:
        - field: args.amount
          operator: gt
          value: 50
        - field: args.amount
          operator: lte
          value: 500
    decision: require_approval

  - id: block-large-refunds
    description: Block large refunds
    priority: 10
    match:
      agent: support-agent
      tool: stripe.refund
    conditions:
      - field: args.amount
        operator: gt
        value: 500
    decision: block
