version: 1
defaults:
  decision: block
policies:
  - id: allow-safe-reads
    match:
      agent: coding-agent
      tool: filesystem.read
    conditions:
      - field: args.path
        operator: not_contains
        value: ".env"
      - field: args.path
        operator: not_contains
        value: "private"
    decision: allow

  - id: require-approval-terminal
    match:
      agent: coding-agent
      tool: terminal.run
    decision: require_approval
