version: 1
defaults:
  decision: block
policies:
  - id: allow-small-refunds
    description: Allow small refunds automatically
    match:
      agent: support-agent
      tool: stripe.refund
      args:
        amount_lte: 50
    decision: allow

  - id: approve-medium-refunds
    description: Require approval for medium refunds
    match:
      agent: support-agent
      tool: stripe.refund
      args:
        amount_gt: 50
        amount_lte: 500
    decision: require_approval

  - id: block-large-refunds
    description: Block large refunds
    match:
      agent: support-agent
      tool: stripe.refund
      args:
        amount_gt: 500
    decision: block

  - id: block-account-deletion-production
    description: Block account deletion in production
    match:
      agent: support-agent
      tool: account.delete
      field_equals:
        field: environment
        value: production
    decision: block

  - id: approve-external-email
    description: Require approval before sending external email
    match:
      agent: support-agent
      tool: email.send
      not_contains:
        field: recipient
        value: "@example.com"
    decision: require_approval
