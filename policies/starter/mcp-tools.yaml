version: 1
defaults:
  decision: block
policies:
  - id: allow-approved-read-only-tools
    description: Allow approved read-only MCP tools
    match:
      agent: mcp-agent
      tool: mcp.read
    conditions:
      - field: args.approved
        operator: eq
        value: true
    decision: allow

  - id: approve-write-tools
    description: Require approval for write MCP tools
    match:
      agent: mcp-agent
      tool: mcp.write
    decision: require_approval

  - id: block-filesystem-delete
    description: Block filesystem delete operations
    match:
      agent: mcp-agent
      tool: filesystem.delete
    decision: block

  - id: block-shell-execution
    description: Block shell execution through MCP tools
    match:
      agent: mcp-agent
      tool: shell.execute
    decision: block

  - id: block-unknown-mcp-servers
    description: Block unknown MCP servers by default
    match:
      agent: mcp-agent
    conditions:
      - field: args.approved
        operator: neq
        value: true
    decision: block

  - id: allow-safe-filesystem-read
    description: Allow safe filesystem read operations containing /safe/
    match:
      agent: mcp-agent
      tool: mcp.filesystem.read
    conditions:
      - field: args.path
        operator: contains
        value: /safe/
    decision: allow

  - id: require-approval-filesystem-write
    description: Require approval for filesystem write operations
    match:
      agent: mcp-agent
      tool: mcp.filesystem.write
    decision: require_approval

  - id: block-shell-run-prod
    description: Block shell run in production
    match:
      agent: mcp-agent
      tool: mcp.shell.run
    conditions:
      - field: context.environment
        operator: eq
        value: production
    decision: block

  - id: allow-shell-run-non-prod
    description: Allow shell run in non-production environments
    match:
      agent: mcp-agent
      tool: mcp.shell.run
    conditions:
      - field: context.environment
        operator: neq
        value: production
    decision: allow
