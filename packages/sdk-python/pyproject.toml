[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "enforra"
version = "0.1.0"
description = "Local-first Python SDK for Enforra OSS tool-call enforcement."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "Apache-2.0"}
authors = [
    {name = "Enforra Maintainers", email = "maintainers@enforra.com"}
]
dependencies = ["PyYAML>=6.0"]

[project.urls]
Homepage = "https://github.com/enforra/enforra"
Repository = "https://github.com/enforra/enforra.git"
Issues = "https://github.com/enforra/enforra/issues"


[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
