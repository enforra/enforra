name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run OSS verification
        run: pnpm verify:oss

      - name: Policy tests
        run: pnpm policy:test:all

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python SDK
        run: |
          cd packages/sdk-python
          python3 -m pip install -e ".[dev]"

      - name: Run Python SDK tests
        run: |
          cd packages/sdk-python
          python3 -m pytest

      - name: Run Python example (enforce)
        run: python3 examples/python-support-refund-agent/example.py

      - name: Run Python example (observe)
        run: python3 examples/python-support-refund-agent/example.py --observe
