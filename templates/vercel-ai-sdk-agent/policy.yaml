version: 1
defaults:
  decision: block
policies:
  - id: allow-safe-file-read
    description: Allow reading safe source files
    match:
      agent: coding-agent
      tool: filesystem.read
    conditions:
      - field: args.path
        operator: not_contains
        value: .env
    decision: allow

  - id: block-sensitive-file-read
    description: Block reading sensitive files
    match:
      agent: coding-agent
      tool: filesystem.read
    conditions:
      - field: args.path
        operator: contains
        value: .env
    decision: block

  - id: require-approval-terminal-run
    description: Require approval for terminal commands
    match:
      agent: coding-agent
      tool: terminal.run
    decision: require_approval
